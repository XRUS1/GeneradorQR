<html>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1, user-scalable=no'>
  <meta name='mobile-web-app-capable' content='yes'>
  <meta name='apple-mobile-web-app-capable' content='yes'>
  <link rel='icon' type='image/png' sizes='3232' href='favicon-32x32.png'>
  <link rel='icon' type='image/png' sizes='96x96' href='favicon-96x96.png'>
  <link rel='stylesheet' href='css/common.css'>
  <title>Seguimiento a escala de la habitacion (Magic Window)</title>
</head>
<body>
  <header>
    <details open>
      <summary>Escala de habitacion</summary>
      <p>
        Haz clic en el botón de abajo para activar los sensores de movimiento de tu teléfono y explorar la escena en 360 grados sin necesidad de cascos.
        <a class="back" href="./">Back</a>
      </p>
    </details>
  </header>

  <script type="module">
    import { WebXRButton } from './js/util/webxr-button.js';
    import { Scene } from './js/render/scenes/scene.js';
    import { Renderer, createWebGLContext } from './js/render/core/renderer.js';
    import { Gltf2Node } from './js/render/nodes/gltf2.js';
    import { SkyboxNode } from './js/render/nodes/skybox.js';
    import { QueryArgs } from './js/util/query-args.js';

    // Si se solicita, utilizar polyfill para proveer el soporte de dispositivos móviles
    import WebXRPolyfill from './js/third-party/webxr-polyfill/build/webxr-polyfill.module.js';
    if (QueryArgs.getBool('usePolyfill', true)) {
      let polyfill = new WebXRPolyfill();
    }

    // Variables globales para XR
    let xrButton = null;
    let xrSession = null;
    let xrRefSpace = null;

    // Variables locales de escena para GL.
    let gl = null;
    let renderer = null;
    let scene = new Scene();

    // Cargando el modelo y entorno idénticos a tus capturas
    scene.addNode(new Gltf2Node({url: 'media/gltf/camp/camp.gltf'}));
    scene.addNode(new SkyboxNode({url: 'media/textures/eilenriede-park-2k.png'}));
    scene.standingStats(true);

    function initXR() {
      // Configuramos el botón original para pedir la activación del usuario
      xrButton = new WebXRButton({
        onRequestSession: onRequestSession,
        onEndSession: onEndSession,
        textEnterXR: "INICIAR PANORAMA",
        textXRNotFound: "XR NO SOPORTADO",
        textLeaveXR: "SALIR"
      });
      document.querySelector('header').appendChild(xrButton.domElement);

      if (navigator.xr) {
        // Comprobamos soporte para modo monoscópico integrado en pantalla ('inline')
        navigator.xr.isSessionSupported('inline').then((supported) => {
          xrButton.enabled = supported;
        });
      }
    }

    // El clic del usuario activa esta función, cumpliendo la regla de seguridad del navegador
    function onRequestSession() {
      return navigator.xr.requestSession('inline').then(onSessionStarted);
    }

    function onSessionStarted(session) {
      xrSession = session;
      xrButton.setSession(session);
      session.addEventListener('end', onSessionEnded);

      // Inicializa el contexto de renderizado gráfico
      initGL();

      let glLayer = new XRWebGLLayer(session, gl);
      session.updateRenderState({ baseLayer: glLayer });

      // Solicitamos 'local' para ligar la cámara estrictamente al sensor del giroscopio físico
      session.requestReferenceSpace('local').then((refSpace) => {
        xrRefSpace = refSpace;
        session.requestAnimationFrame(onXRFrame);
      }).catch(() => {
        // Alternativa si el sistema operativo restringe el modo 'local'
        session.requestReferenceSpace('viewer').then((refSpace) => {
          xrRefSpace = refSpace;
          session.requestAnimationFrame(onXRFrame);
        });
      });
    }

    function initGL() {
      if (gl) return;
      gl = createWebGLContext({ xrCompatible: true });
      document.body.appendChild(gl.canvas);

      onResize();
      window.addEventListener('resize', onResize);

      renderer = new Renderer(gl);
      scene.setRenderer(renderer);
    }

    function onResize() {
      if (!gl) return;
      gl.canvas.width = gl.canvas.clientWidth * window.devicePixelRatio;
      gl.canvas.height = gl.canvas.clientHeight * window.devicePixelRatio;
    }

    function onEndSession(session) {
      session.end();
    }

    function onSessionEnded(event) {
      xrButton.setSession(null);
      xrSession = null;
    }

    function onXRFrame(t, frame) {
      let session = frame.session;
      
      // OBLIGATORIO: Solicitamos la pose usando el espacio de referencia local puro
      // Esto lee directamente los sensores de rotación del teléfono en vez de gestos táctiles.
      let pose = frame.getViewerPose(xrRefSpace);

      scene.startFrame();
      session.requestAnimationFrame(onXRFrame);

      if (pose) {
        scene.drawXRFrame(frame, pose);
      }

      scene.endFrame();
    }

    // Arranca el proceso de inicialización del botón
    initXR();
  </script>
</body>
</html>
